name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Get cache week
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Cache grimoire binary
        id: cache-grimoire
        uses: actions/cache@v4
        with:
          path: ~/go/bin/grimoire
          key: ${{ runner.os }}-grimoire-latest-${{ steps.date.outputs.week }}
      - name: Install grimoire
        if: steps.cache-grimoire.outputs.cache-hit != 'true'
        run: go install github.com/jeffreytse/grimoire@latest
      - name: Validate all skills (quality + duplicates)
        run: grimoire validate skills/
      - name: Run conformance test suite
        run: grimoire validate --test-schema schema/tests
